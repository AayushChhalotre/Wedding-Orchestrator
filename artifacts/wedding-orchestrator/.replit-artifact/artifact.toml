kind = "web"
previewPath = "/"
title = "AI Wedding Timeline Orchestrator"
version = "1.0.0"
id = "artifacts/wedding-orchestrator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19238

[services.development]
run = "pnpm --filter @workspace/wedding-orchestrator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wedding-orchestrator", "run", "build" ]
publicDir = "artifacts/wedding-orchestrator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19238"
BASE_PATH = "/"
